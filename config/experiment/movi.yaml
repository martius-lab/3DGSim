# @package _global_

defaults:
  - override /dataset: movi
  - override /model/encoder: costvolume
  - override /loss: [mse, lpips]

wandb:
  name: movi
  tags: [movi, 256x256]

data_loader:
  train:
    batch_size: 2

trainer:
  max_steps: 3000001

# ----- Additional params for default best model customization
model:
  encoder:
    num_depth_candidates: 128
    costvolume_unet_feat_dim: 128
    costvolume_unet_channel_mult: [1,1,1]
    costvolume_unet_attn_res: [4]
    gaussians_per_pixel: 1
    depth_unet_feat_dim: 32
    depth_unet_attn_res: [16]
    depth_unet_channel_mult: [1,1,1,1,1]

# lpips loss
loss:
  lpips:
    apply_after_step: 0
    weight: 0.05

dataset:
  background_color: [0.,0.,0.]
  roots: [/fast/mzhobro/datasets/movi_a/movi_a/movi_a_128_128]
  image_shape: [128,128]

  near: 1.4
  far: 20.
  workspace_limits: [[-8.1, -8.1, -0.3], [8.1, 8.1, 5.1]]

  baseline_scale_bounds: false
  make_baseline_1: false

  # control for dynamic scenes
  n_step_state: 1
  n_step_state_predict: 0 # nr of steps from the step that predict forward (starting from the back)
  n_step_predict_multiple:  1 # multiples that each of n_step_state_predict predicts forward in time

  view_sampler:
    num_target_views: 1
    num_context_views: 2
    # target_views: [0, 1, 2, 3]
    # context_views: [0, 1]
test:
  eval_time_skip_steps: 0
  compute_scores: true
